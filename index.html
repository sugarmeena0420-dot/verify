<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Device Verification</title>
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #182533;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            width: 85%;
            background: #223142;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .scan-icon {
            font-size: 75px;
            margin-bottom: 20px;
            display: inline-block;
            animation: pulse 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; color: #3498db; }
            50% { transform: scale(1.1); opacity: 1; color: #2ec4b6; }
            100% { transform: scale(1); opacity: 0.7; color: #3498db; }
        }
        .progress-bar {
            width: 100%;
            background-color: #101921;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 25px;
            height: 12px;
            border: 1px solid #2b394a;
        }
        .progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #3498db, #2ec4b6);
            transition: width 0.1s linear;
        }
        .status {
            font-size: 16px;
            font-weight: 600;
            margin-top: 15px;
            color: #b0bec5;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="scan-icon" id="icon">🛡️</div>
        <div class="status" id="status">Checking Device Integrity...</div>
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let width = 0;
        const progress = document.getElementById('progress');
        const status = document.getElementById('status');
        const icon = document.getElementById('icon');

        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                status.innerText = "Device Verified Successfully! ✅";
                status.style.color = "#2ecc71";
                icon.innerText = "🔒";
                icon.style.animation = "none";
                
                setTimeout(() => {
                    tg.close();
                }, 1500);
            } else {
                width += 2;
                progress.style.width = width + '%';
                
                if(width == 30) {
                    status.innerText = "Scanning for Malicious Scripts... 🔎";
                }
                if(width == 60) {
                    status.innerText = "Verifying Telegram Session... ⚙️";
                }
                if(width == 85) {
                    status.innerText = "Finishing Security Checks... 🚀";
                }
            }
        }, 80);
    </script>
</body>
      </html>
